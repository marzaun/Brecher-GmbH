<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flask Debugger{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🔍 Flask Debugger</h1>
            </div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/status">Status</a>
                {% if debug_enabled %}
                <a href="/debug/info" class="debug-link">Debug Info</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Flask Debugger | 
            {% if debug_enabled %}
                <span class="debug-badge">🔴 DEBUG MODE ACTIVE</span>
            {% else %}
                <span class="production-badge">🟢 PRODUCTION MODE</span>
            {% endif %}
            </p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
