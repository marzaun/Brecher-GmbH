version: '3.8'

services:
  web:
    build: .
    container_name: flask-debugger
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DEBUG=0
      - HOST=0.0.0.0
      - PORT=5000
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  logs:
